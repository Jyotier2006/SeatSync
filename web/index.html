<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SeatSync Demo</title>
  <style>
    :root { color-scheme: dark; --bg:#0b1020; --panel:#141b31; --line:#273250; --accent:#7c9cff; --good:#39d98a; --muted:#9aa7c7; }
    * { box-sizing:border-box; }
    body { margin:0; font:15px/1.5 Inter, ui-sans-serif, system-ui, sans-serif; background:radial-gradient(circle at top,#182342,var(--bg) 42%); color:#f5f7ff; }
    main { width:min(1100px,92vw); margin:0 auto; padding:42px 0 80px; }
    header { display:flex; justify-content:space-between; gap:20px; align-items:flex-start; margin-bottom:28px; }
    h1 { margin:0; font-size:clamp(34px,6vw,64px); letter-spacing:-.04em; }
    h2 { margin:0 0 14px; }
    p { color:var(--muted); }
    a { color:#b9c8ff; }
    .badge { padding:8px 12px; border:1px solid var(--line); border-radius:999px; color:var(--good); background:#10182d; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; }
    .card { background:rgba(20,27,49,.92); border:1px solid var(--line); border-radius:18px; padding:20px; box-shadow:0 18px 60px rgba(0,0,0,.18); }
    label { display:block; color:var(--muted); margin:9px 0 5px; }
    input, select, button { width:100%; border-radius:11px; border:1px solid var(--line); padding:11px 12px; font:inherit; }
    input, select { background:#0e1529; color:white; }
    button { background:var(--accent); color:#07102c; font-weight:750; cursor:pointer; margin-top:12px; }
    button.secondary { background:#1b2541; color:#eaf0ff; }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .list { display:grid; gap:9px; }
    .item { border:1px solid var(--line); border-radius:12px; padding:12px; cursor:pointer; background:#10172b; }
    .item:hover { border-color:var(--accent); }
    .selected { outline:2px solid var(--accent); }
    .seats { display:grid; grid-template-columns:repeat(8,1fr); gap:8px; }
    .seat { padding:9px 4px; text-align:center; border:1px solid var(--line); border-radius:8px; cursor:pointer; background:#10172b; }
    .seat.selected { background:var(--accent); color:#07102c; }
    .seat.unavailable { opacity:.35; cursor:not-allowed; text-decoration:line-through; }
    pre { white-space:pre-wrap; overflow-wrap:anywhere; background:#090e1b; border:1px solid var(--line); padding:14px; border-radius:12px; min-height:100px; }
    .wide { grid-column:1/-1; }
    @media (max-width:760px) { .grid { grid-template-columns:1fr; } .seats { grid-template-columns:repeat(4,1fr); } header { display:block; } }
  </style>
</head>
<body>
<main>
  <header>
    <div><h1>SeatSync</h1><p>Interactive demonstration of atomic seat locks and idempotent checkout.</p></div>
    <span class="badge">Portfolio Demo</span>
  </header>

  <div class="grid">
    <section class="card">
      <h2>1. Sign in</h2>
      <label>Email</label><input id="email" value="demo@seatsync.dev" />
      <label>Password</label><input id="password" type="password" value="Demo@12345" />
      <button onclick="login()">Sign in and load movies</button>
      <p id="authState">Not authenticated</p>
    </section>

    <section class="card">
      <h2>2. Select movie</h2>
      <div id="movies" class="list"><p>Sign in first.</p></div>
    </section>

    <section class="card">
      <h2>3. Select show</h2>
      <div id="shows" class="list"><p>Select a movie.</p></div>
    </section>

    <section class="card">
      <h2>4. Select seats</h2>
      <div id="seats" class="seats"></div>
      <button id="bookButton" disabled onclick="checkout()">Lock and confirm selected seats</button>
    </section>

    <section class="card wide">
      <h2>Result</h2>
      <pre id="output">API responses will appear here.</pre>
      <p><a href="/docs" target="_blank">Open Swagger API documentation</a></p>
    </section>
  </div>
</main>
<script>
const API='/api/v1';
let token='', selectedMovie='', selectedShow='', selectedSeats=new Set();
const output=(data)=>document.getElementById('output').textContent=typeof data==='string'?data:JSON.stringify(data,null,2);
const authHeaders=()=>({'Authorization':`Bearer ${token}`,'Content-Type':'application/json'});

async function api(path, options={}) {
  const response=await fetch(API+path, options);
  const data=await response.json();
  if(!response.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}
async function login(){
  try{
    const data=await api('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email.value,password:password.value})});
    token=data.access_token; authState.textContent=`Signed in as ${data.user.full_name}`; output(data); await loadMovies();
  }catch(e){ output(e.message); }
}
async function loadMovies(){
  const data=await api('/movies'); movies.innerHTML='';
  data.forEach(movie=>{const el=document.createElement('div');el.className='item';el.innerHTML=`<strong>${movie.title}</strong><br><small>${movie.language} · ${movie.duration_minutes} min</small>`;el.onclick=()=>loadShows(movie.id,el);movies.appendChild(el);});
}
async function loadShows(movieId, el){
  [...movies.children].forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selectedMovie=movieId;
  const data=await api(`/movies/${movieId}/shows`); shows.innerHTML=''; seats.innerHTML='';
  data.forEach(show=>{const item=document.createElement('div');item.className='item';item.innerHTML=`<strong>${show.venue_name}</strong><br><small>${new Date(show.starts_at).toLocaleString()} · ${show.screen_name}</small>`;item.onclick=()=>loadSeats(show.show_id,item);shows.appendChild(item);}); output(data);
}
async function loadSeats(showId, el){
  [...shows.children].forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selectedShow=showId;selectedSeats.clear();
  const data=await api(`/shows/${showId}/seats`); seats.innerHTML='';
  data.forEach(s=>{const item=document.createElement('div');item.className='seat '+(s.status==='AVAILABLE'?'':'unavailable');item.textContent=`${s.row_label}${s.number}`;item.title=`₹${s.price} · ${s.category}`;if(s.status==='AVAILABLE')item.onclick=()=>{item.classList.toggle('selected');item.classList.contains('selected')?selectedSeats.add(s.id):selectedSeats.delete(s.id);bookButton.disabled=selectedSeats.size===0;};seats.appendChild(item);}); output(data);
}
async function checkout(){
  bookButton.disabled=true;
  try{
    const lock=await api('/seat-locks',{method:'POST',headers:authHeaders(),body:JSON.stringify({show_id:selectedShow,show_seat_ids:[...selectedSeats]})});
    const booking=await api('/bookings',{method:'POST',headers:authHeaders(),body:JSON.stringify({lock_token:lock.lock_token})});
    const payment=await api('/payments',{method:'POST',headers:authHeaders(),body:JSON.stringify({booking_id:booking.id,method:'UPI',idempotency_key:crypto.randomUUID()})});
    const result=await api(`/payments/${payment.id}/mock-result`,{method:'POST',headers:authHeaders(),body:JSON.stringify({success:true,gateway_reference:'WEB-DEMO-'+Date.now()})});
    output({lock,booking,payment,result,message:'Booking confirmed successfully'}); await loadSeats(selectedShow,[...shows.children].find(x=>x.classList.contains('selected')));
  }catch(e){output(e.message);bookButton.disabled=false;}
}
</script>
</body>
</html>
